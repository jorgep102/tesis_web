    <script>
        // Función que se ejecuta cada vez que el usuario hace scroll
        window.addEventListener('scroll', function () {
            // Altura total de la página (incluyendo contenido no visible)
            const alturaTotal = document.documentElement.scrollHeight;
            // Altura visible de la ventana
            const alturaVisible = window.innerHeight;
            // Cuánto se ha desplazado desde arriba
            const desplazamiento = window.scrollY;

            // Si el scroll ha llegado al fondo (con un pequeño margen de 5px)
            if (desplazamiento + alturaVisible >= alturaTotal - 5) {
                // Cambia 'otra-pagina.html' por la URL deseada
                window.location.href = 'triste.html';
            }
        });
